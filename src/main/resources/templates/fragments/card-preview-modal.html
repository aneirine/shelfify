<div th:fragment="cardPreviewModal"
     id="card-preview-modal"
     class="fixed inset-0 bg-black bg-opacity-50 backdrop-blur-sm hidden flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-4xl p-0 flex overflow-hidden h-[500px] relative">
        <!-- Закрити -->
        <button onclick="closeCardPreview()"
                class="absolute top-3 right-3 text-gray-400 hover:text-black text-2xl font-bold z-10">
            ✕
        </button>

        <!-- Ліва частина: картинка -->
        <div class="w-1/3 h-full">
            <img id="preview-cover"
                 src=""
                 alt=""
                 class="w-full h-full object-cover"/>
        </div>

        <!-- Права частина -->
        <div class="w-2/3 p-6 flex flex-col justify-start">
            <h2 id="preview-title" class="text-2xl font-semibold mb-4"></h2>
            <p id="preview-description" class="text-gray-700 whitespace-pre-wrap"></p>
        </div>
    </div>
</div>
