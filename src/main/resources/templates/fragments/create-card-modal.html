<div th:fragment="modal"
     id="modal"
     class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-50 backdrop-blur-sm hidden z-50">
    <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-md relative">
        <button
                class="absolute top-3 right-3 text-gray-400 hover:text-black"
                onclick="document.getElementById('modal').classList.add('hidden')">
            ✕
        </button>

        <h2 class="text-xl font-semibold mb-4 text-center">Add New Item</h2>

        <form method="post" action="/library/card" class="space-y-4">
            <!-- Title -->
            <div>
                <label class="block mb-1 font-medium">Title</label>
                <input type="text" name="title" required
                       class="w-full border border-gray-300 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"/>
            </div>

            <!-- Cover URL -->
            <div>
                <label class="block mb-1 font-medium">Cover URL</label>
                <input type="url" name="coverUrl" required
                       class="w-full border border-gray-300 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"/>
            </div>

            <!-- Description -->
            <div>
                <label class="block mb-1 font-medium">Description</label>
                <textarea name="description" rows="4"
                          class="w-full border border-gray-300 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                          placeholder="Enter description..."></textarea>
            </div>

            <!-- Submit -->
            <div class="flex justify-end">
                <button type="submit"
                        class="bg-blue-600 text-white px-6 py-2 rounded-xl hover:bg-blue-700">
                    Save
                </button>
            </div>
        </form>
    </div>
</div>
